<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f2f3f3; }
  .header { background: #232f3e; color: white; padding: 10px 20px; font-size: 18px; margin-bottom: 20px; }
  .filter-box { background: white; border: 1px solid #eaeded; padding: 15px; margin-bottom: 20px; }
  .label { font-size: 12px; font-weight: bold; color: #545b64; margin-bottom: 5px; display: block; }
  .input { padding: 8px; border: 1px solid #aab7b8; width: 300px; margin-bottom: 15px; border-radius: 2px; }
  .table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #eaeded; }
  .table th { background: #fafafa; border-bottom: 1px solid #eaeded; padding: 10px; text-align: left; font-size: 14px; color: #545b64; }
  .table td { padding: 10px; border-bottom: 1px solid #eaeded; font-size: 14px; color: #16191f; }
  .link { color: #0073bb; text-decoration: none; }
</style>
</head>
<body>
  <div class="header">AWS Resource Groups > Tag Editor</div>
  
  <div class="filter-box">
    <span class="label">Regions</span>
    <input type="text" class="input" value="ap-southeast-2" disabled>
    
    <span class="label">Resource types</span>
    <input type="text" class="input" value="AWS::EC2::Instance" disabled>
    
    <span class="label">Tags</span>
    <input type="text" class="input" value="Environment : Production" disabled>
  </div>

  <table class="table">
    <tr>
      <th>Resource identifier</th>
      <th>Resource type</th>
      <th>Tags</th>
    </tr>
    <tr>
      <td><a href="#" class="link">i-0abcd1234efgh5678</a></td>
      <td>AWS::EC2::Instance</td>
      <td>Name: FCJ-Web-Server, Environment: Production, Project: FCJ-Workshop</td>
    </tr>
  </table>
</body>
</html>
