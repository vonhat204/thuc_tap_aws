<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f2f3f3; }
  .header { background: #232f3e; color: white; padding: 10px 20px; font-size: 18px; margin-bottom: 20px; }
  .box { background: white; border: 1px solid #eaeded; padding: 20px; font-size: 14px; color: #16191f; }
  h2 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eaeded; padding-bottom: 10px; }
  .chart { height: 200px; display: flex; align-items: flex-end; gap: 5px; margin-top: 20px; border-bottom: 1px solid #ccc; border-left: 1px solid #ccc; padding-bottom: 5px; padding-left: 5px; }
  .bar { width: 30px; background: #d13212; position: relative; }
  .bar.allow { background: #1d8102; }
  .bar-label { position: absolute; bottom: -20px; left: 0; right: 0; text-align: center; font-size: 10px; color: #555; transform: rotate(-45deg); }
  .legend { display: flex; gap: 20px; margin-top: 20px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .color-box { width: 12px; height: 12px; }
  .color-box.red { background: #d13212; }
  .color-box.green { background: #1d8102; }
  .title { font-weight: bold; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="header">AWS WAF > Web ACLs > fcj-waf-acl > Traffic overview</div>
  <div class="box">
    <div class="title">Requests per 5 minutes</div>
    <div class="chart">
      <div class="bar allow" style="height: 20px;"><div class="bar-label">10:00</div></div>
      <div class="bar allow" style="height: 35px;"><div class="bar-label">10:05</div></div>
      <div class="bar allow" style="height: 25px;"><div class="bar-label">10:10</div></div>
      <div class="bar" style="height: 120px;"><div class="bar-label">10:15</div></div>
      <div class="bar" style="height: 180px;"><div class="bar-label">10:20</div></div>
      <div class="bar" style="height: 150px;"><div class="bar-label">10:25</div></div>
      <div class="bar" style="height: 80px;"><div class="bar-label">10:30</div></div>
      <div class="bar allow" style="height: 30px;"><div class="bar-label">10:35</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="color-box green"></div> Allowed requests</div>
      <div class="legend-item"><div class="color-box red"></div> Blocked requests</div>
    </div>
  </div>
</body>
</html>
