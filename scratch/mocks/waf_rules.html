<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f2f3f3; }
  .header { background: #232f3e; color: white; padding: 10px 20px; font-size: 18px; margin-bottom: 20px; }
  .table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #eaeded; }
  .table th { background: #fafafa; border-bottom: 1px solid #eaeded; padding: 10px; text-align: left; font-size: 14px; color: #545b64; }
  .table td { padding: 10px; border-bottom: 1px solid #eaeded; font-size: 14px; color: #16191f; }
  .action { color: #d13212; font-weight: bold; border: 1px solid #d13212; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
  .action.allow { color: #1d8102; border-color: #1d8102; }
  .link { color: #0073bb; text-decoration: none; }
</style>
</head>
<body>
  <div class="header">AWS WAF > Web ACLs > fcj-waf-acl > Rules</div>
  <table class="table">
    <tr>
      <th>Priority</th>
      <th>Name</th>
      <th>Type</th>
      <th>Action</th>
    </tr>
    <tr>
      <td>0</td>
      <td><a href="#" class="link">BlockBadIPsRule</a></td>
      <td>Regular rule</td>
      <td><span class="action">Block</span></td>
    </tr>
    <tr>
      <td>1</td>
      <td><a href="#" class="link">AWS-AWSManagedRulesCommonRuleSet</a></td>
      <td>Managed rule group</td>
      <td><span class="action allow">No override</span></td>
    </tr>
    <tr>
      <td>Default</td>
      <td>Default Web ACL action for requests that don't match any rules</td>
      <td>-</td>
      <td><span class="action allow">Allow</span></td>
    </tr>
  </table>
</body>
</html>
