<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f2f3f3; }
  .header { background: #232f3e; color: white; padding: 10px 20px; font-size: 18px; margin-bottom: 20px; }
  .table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #eaeded; }
  .table th { background: #fafafa; border-bottom: 1px solid #eaeded; padding: 10px; text-align: left; font-size: 14px; color: #545b64; }
  .table td { padding: 10px; border-bottom: 1px solid #eaeded; font-size: 14px; color: #16191f; }
  .tag { background: #eaeded; padding: 2px 6px; border-radius: 10px; font-size: 12px; margin-right: 5px; color: #16191f; border: 1px solid #d5dbdb; }
  .status-green { color: #1d8102; font-weight: bold; }
  .status-green::before { content: "● "; }
  .link { color: #0073bb; text-decoration: none; }
</style>
</head>
<body>
  <div class="header">EC2 > Instances</div>
  <table class="table">
    <tr>
      <th>Name</th>
      <th>Instance ID</th>
      <th>Instance state</th>
      <th>Instance type</th>
      <th>Tags</th>
    </tr>
    <tr>
      <td><a href="#" class="link">FCJ-Web-Server</a></td>
      <td>i-0abcd1234efgh5678</td>
      <td class="status-green">Running</td>
      <td>t2.micro</td>
      <td>
        <span class="tag">Environment: Production</span>
        <span class="tag">Project: FCJ-Workshop</span>
      </td>
    </tr>
  </table>
</body>
</html>
